name: qxilt-api-prod
services:
  - name: api
    type: web
    git:
      repository: github.com/thealphacubicle/qxilt
      branch: main
    docker:
      dockerfile: Dockerfile.prod
    instance_type: nano
    regions:
      - was
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    health_checks:
      - http:
          path: /reviews/healthz
          port: 8000
          initial_delay: 5
          period: 10
          success_threshold: 1
          failure_threshold: 3
    env:
      - key: SUPABASE_URL
        value: ""
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: ""
      - key: QXILT_ALPHA
        value: ""
      - key: QXILT_BETA
        value: ""
      - key: QXILT_CONFIDENCE_LEVEL
        value: ""
      - key: QXILT_API_BASE_URL
        value: ""
